<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
    header { text-align: center; padding: 3rem 0; border-bottom: 1px solid #eee; }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .subtitle { color: #666; font-size: 1.1rem; }
    section { padding: 2rem 0; }
    h2 { font-size: 1.5rem; margin-bottom: 1rem; }
    .project { margin-bottom: 1.5rem; }
    .project h3 { font-size: 1.1rem; }
    .project a { color: #0066cc; text-decoration: none; }
    .project a:hover { text-decoration: underline; }
    .skills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .skill { background: #f0f0f0; padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.9rem; }
    footer { text-align: center; padding: 2rem 0; color: #666; font-size: 0.9rem; border-top: 1px solid #eee; }
    footer a { color: #0066cc; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Your Name</h1>
      <p class="subtitle">Your tagline or role</p>
    </header>

    <section>
      <h2>About</h2>
      <p>Write a brief description about yourself here.</p>
    </section>

    <section>
      <h2>Skills</h2>
      <div class="skills">
        <span class="skill">HTML</span>
        <span class="skill">CSS</span>
        <span class="skill">JavaScript</span>
      </div>
    </section>

    <section>
      <h2>Projects</h2>
      <div class="project">
        <h3>Project Name</h3>
        <p>Project description.</p>
        <a href="#">View Project →</a>
      </div>
    </section>

    <section>
      <h2>Contact</h2>
      <p>Email: your@email.com</p>
      <p>GitHub: <a href="https://github.com/yourusername">github.com/yourusername</a></p>
    </section>

    <footer>
      <p>© 2026 Your Name</p>
    </footer>
  </div>
</body>
</html>
