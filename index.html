<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            padding: 40px 0;
            border-bottom: 1px solid #eee;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
        }
        section {
            padding: 30px 0;
            border-bottom: 1px solid #eee;
        }
        h2 {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #222;
        }
        .project {
            margin-bottom: 20px;
        }
        .project h3 {
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        .project p {
            color: #666;
            font-size: 0.95em;
        }
        a {
            color: #0066cc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        footer {
            padding: 30px 0;
            color: #666;
            font-size: 0.9em;
        }
        .contact-links {
            display: flex;
            gap: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Your Name</h1>
        <p class="subtitle">Researcher • Developer • Scholar</p>
    </header>

    <section>
        <h2>About</h2>
        <p>Brief introduction about yourself and your research interests.</p>
    </section>

    <section>
        <h2>Projects</h2>
        <div class="project">
            <h3><a href="#">Project Title</a></h3>
            <p>Description of your research project.</p>
        </div>
        <div class="project">
            <h3><a href="#">Another Project</a></h3>
            <p>Description of another project.</p>
        </div>
    </section>

    <section>
        <h2>Contact</h2>
        <div class="contact-links">
            <a href="https://github.com/namknnguyen">GitHub</a>
            <a href="mailto:your@email.com">Email</a>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Your Name</p>
    </footer>
</body>
</html>
