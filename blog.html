<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }
        nav {
            display: flex;
            gap: 30px;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }
        nav a {
            color: #666;
            text-decoration: none;
            font-size: 0.95em;
        }
        nav a:hover, nav a.active {
            color: #000;
            text-decoration: underline;
        }
        header {
            padding: 40px 0;
            border-bottom: 1px solid #eee;
        }
        h1 {
            font-size: 1.8em;
            font-weight: 600;
        }
        section {
            padding: 30px 0;
            border-bottom: 1px solid #eee;
        }
        h2 {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #222;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        footer {
            padding: 30px 0;
            color: #888;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html" class="active">Research Blog</a>
    </nav>

    <header>
        <h1>Research Blog</h1>
    </header>

    <section>
        <h2>Posts</h2>
        <p>Coming soon...</p>
    </section>

    <footer>
        <p>&copy; 2026 Nam Nguyen</p>
    </footer>
